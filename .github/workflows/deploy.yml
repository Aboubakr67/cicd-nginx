name: CI/CD Nginx

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd ~/cicd-nginx
            git pull origin main
            docker build -t cicd-nginx .
            docker stop cicd-nginx || true
            docker rm cicd-nginx || true
            docker run -d --name cicd-nginx -p 8088:80 --restart unless-stopped cicd-nginx

      - name: Afficher l'IP du serveur
        run: echo "Site accessible sur http://${{ secrets.SERVER_IP }}:8088"